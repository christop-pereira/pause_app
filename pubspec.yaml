name: pause
description: Behavioral prevention app - PAUSE
publish_to: "none"

version: 2.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0
  flutter_local_notifications: ^17.2.1+2
  timezone: ^0.9.4
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  audioplayers: ^6.0.0
  file_picker: ^8.0.5
  fl_chart: ^0.68.0
  intl: ^0.19.0
  uuid: ^4.4.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  record: ^6.2.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/
